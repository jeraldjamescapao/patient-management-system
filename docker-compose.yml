services:
  postgres:
    image: postgres:17
    container_name: medcore-postgres
    environment:
      POSTGRES_DB: medcore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - medcore_postgres_data:/var/lib/postgresql/data

  seq:
    image: datalust/seq:latest
    container_name: medcore-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "True"
    ports:
      - "5341:80"
    volumes:
      - medcore_seq_data:/data
      
volumes:
  medcore_postgres_data:
  medcore_seq_data: