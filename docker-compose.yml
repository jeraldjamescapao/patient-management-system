services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: medcore-sqlserver
    environment:
      SA_PASSWORD: "MedCore_Dev_2024!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - medcore_sqlserver_data:/var/opt/mssql

  seq:
    image: datalust/seq:latest
    container_name: medcore-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "True"
    ports:
      - "5341:80"
    volumes:
      - medcore_seq_data:/data
      
volumes:
  medcore_sqlserver_data:
  medcore_seq_data: